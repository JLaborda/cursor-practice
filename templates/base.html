<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ZenvaResizer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #07070f;
      --surface: #0f0f1a;
      --surface-2: #141428;
      --neon-cyan: #00f5ff;
      --neon-magenta: #ff00e5;
      --neon-lime: #b8ff00;
      --text: #e8e8ff;
      --muted: #8888aa;
      --error: #ff4466;
      --glow-cyan: 0 0 12px rgba(0, 245, 255, 0.55), 0 0 32px rgba(0, 245, 255, 0.2);
      --glow-magenta: 0 0 12px rgba(255, 0, 229, 0.5), 0 0 28px rgba(255, 0, 229, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Rajdhani", system-ui, sans-serif;
      font-size: 1.125rem;
      font-weight: 500;
      color: var(--text);
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0, 245, 255, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(255, 0, 229, 0.08), transparent),
        radial-gradient(ellipse 50% 30% at 0% 80%, rgba(184, 255, 0, 0.06), transparent),
        linear-gradient(180deg, var(--bg) 0%, #0a0a18 100%);
    }

    .site-header,
    .site-footer {
      background: rgba(15, 15, 26, 0.85);
      backdrop-filter: blur(8px);
    }

    .site-header {
      border-bottom: 1px solid rgba(0, 245, 255, 0.2);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.35);
    }

    .site-footer {
      margin-top: auto;
      border-top: 1px solid rgba(255, 0, 229, 0.2);
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.25);
    }

    .header-inner,
    .footer-inner,
    .wrap {
      max-width: {% block max_width %}36rem{% endblock %};
      margin: 0 auto;
      padding-left: 1.25rem;
      padding-right: 1.25rem;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding-top: 1rem;
      padding-bottom: 1rem;
    }

    .logo { text-decoration: none; }

    .site-nav { display: flex; gap: 1.25rem; }

    .site-nav a {
      font-family: "Orbitron", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--muted);
      transition: color 0.2s, text-shadow 0.2s;
    }

    .site-nav a:hover,
    .site-nav a.active {
      color: var(--neon-cyan);
      text-shadow: 0 0 10px rgba(0, 245, 255, 0.5);
    }

    main.wrap {
      flex: 1;
      width: 100%;
      padding-top: 2rem;
      padding-bottom: 2.5rem;
    }

    .footer-inner {
      padding-top: 1.5rem;
      padding-bottom: 1.5rem;
      text-align: center;
    }

    .footer-brand {
      font-family: "Orbitron", sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--neon-magenta);
      margin: 0 0 0.35rem;
    }

    .footer-tagline {
      margin: 0 0 0.5rem;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer-meta {
      margin: 0;
      font-size: 0.8rem;
      color: #666688;
    }

    .page-title {
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0 0 0.75rem;
      color: var(--neon-lime);
      text-shadow: 0 0 16px rgba(184, 255, 0, 0.35);
    }

    .logo .brand {
      display: block;
      font-family: "Orbitron", sans-serif;
      font-weight: 700;
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-lime));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.35));
    }

    .tagline {
      color: var(--muted);
      margin: 0 0 2rem;
      font-size: 1rem;
    }

    .panel {
      background: var(--surface);
      border: 1px solid rgba(0, 245, 255, 0.25);
      border-radius: 12px;
      padding: 1.5rem 1.35rem;
      box-shadow: var(--glow-cyan), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    label {
      display: block;
      margin-top: 1.1rem;
      color: var(--neon-cyan);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    label:first-of-type { margin-top: 0; }

    input[type="number"],
    input[type="file"],
    select {
      display: block;
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.65rem 0.85rem;
      font-family: inherit;
      font-size: 1.05rem;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid rgba(255, 0, 229, 0.35);
      border-radius: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="number"]:focus,
    input[type="file"]:focus,
    select:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 2px rgba(0, 245, 255, 0.25), var(--glow-cyan);
    }

    input[type="file"]::file-selector-button {
      margin-right: 0.75rem;
      padding: 0.35rem 0.85rem;
      font-family: "Orbitron", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .dims {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
    }

    .dims label { margin-top: 1.1rem; }

    button[type="submit"] {
      display: inline-block;
      margin-top: 1.75rem;
      padding: 0.75rem 1.75rem;
      font-family: "Orbitron", sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--bg);
      background: linear-gradient(135deg, var(--neon-lime), var(--neon-cyan));
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(184, 255, 0, 0.4);
      transition: transform 0.15s, box-shadow 0.2s;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(184, 255, 0, 0.55), 0 0 40px rgba(0, 245, 255, 0.25);
    }

    .error {
      margin: 0 0 1.25rem;
      padding: 0.75rem 1rem;
      color: #fff;
      background: rgba(255, 68, 102, 0.15);
      border: 1px solid var(--error);
      border-radius: 8px;
      box-shadow: 0 0 14px rgba(255, 68, 102, 0.35);
    }

    .meta {
      color: var(--muted);
      margin: 0 0 1.5rem;
      padding: 0.65rem 1rem;
      background: rgba(0, 245, 255, 0.06);
      border-left: 3px solid var(--neon-magenta);
      border-radius: 0 8px 8px 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255, 0, 229, 0.3);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--glow-magenta);
    }

    .card h2 {
      font-family: "Orbitron", sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      margin: 0 0 1rem;
      color: var(--neon-lime);
      word-break: break-all;
    }

    .card .preview {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(0, 245, 255, 0.35);
      box-shadow: var(--glow-cyan);
      margin-bottom: 1rem;
    }

    .card img {
      display: block;
      width: 100%;
      height: auto;
    }

    a.download {
      color: var(--neon-cyan);
      text-decoration: none;
      font-weight: 600;
    }

    a.download:hover {
      color: var(--neon-lime);
      text-shadow: 0 0 12px rgba(184, 255, 0, 0.6);
    }

    .back { margin-top: 2rem; }

    .back a {
      color: var(--neon-magenta);
      text-decoration: none;
      font-weight: 600;
    }

    .back a:hover {
      color: var(--neon-cyan);
      text-shadow: var(--glow-cyan);
    }

    @media (max-width: 520px) {
      .dims { grid-template-columns: 1fr; }
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo" href="{{ url_for('index') }}">
        <span class="brand">ZenvaResizer</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="{{ url_for('index') }}"{% if request.endpoint == 'index' %} class="active"{% endif %}>Resize</a>
        {% block header_nav %}{% endblock %}
      </nav>
    </div>
  </header>

  <main class="wrap">
    {% block page_header %}{% endblock %}
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-brand">ZenvaResizer</p>
      <p class="footer-tagline">Batch image resizing in your browser — PNG, JPEG, JPG</p>
      <p class="footer-meta">Powered by Flask &amp; Pillow{% block footer_extra %}{% endblock %}</p>
    </div>
  </footer>
</body>
</html>

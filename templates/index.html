<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZenvaResizer</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.5rem; }
    label { display: block; margin-top: 1rem; }
    input[type="number"], input[type="file"] { width: 100%; margin-top: 0.25rem; }
    button { margin-top: 1.5rem; padding: 0.5rem 1rem; cursor: pointer; }
    .error { color: #b00020; margin-top: 1rem; }
    .hint { color: #555; font-size: 0.875rem; }
  </style>
</head>
<body>
  <h1>ZenvaResizer</h1>
  <p class="hint">Upload up to {{ max_files }} images (PNG, JPEG, JPG).</p>

  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}

  <form method="post" enctype="multipart/form-data">
    <label>
      Images
      <input type="file" name="images" accept=".png,.jpeg,.jpg,.PNG,.JPEG,.JPG" multiple required>
    </label>
    <label>
      Width (px)
      <input type="number" name="width" min="1" value="800" required>
    </label>
    <label>
      Height (px)
      <input type="number" name="height" min="1" value="600" required>
    </label>
    <label>
      Quality (JPEG, 1–100)
      <input type="number" name="quality" min="1" max="100" value="85" required>
    </label>
    <button type="submit">Resize</button>
  </form>
</body>
</html>
